<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <title>All Polish cards</title>
  <style>
    :root {
      --bg: #0b2447;
      --surface: #163a72;
      --surface-light: #23529a;
      --text: #f5f9ff;
      --accent: #5fb3ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #2f76c7 0%, var(--bg) 65%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      background: rgba(15, 37, 70, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }

    .hero {
      text-align: center;
      margin-bottom: 32px;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: -0.06em;
      margin-bottom: 12px;
    }

    .hero p {
      color: rgba(245, 249, 255, 0.72);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(47,118,199,0.18), rgba(15,37,70,0.85));
      border: 1px solid rgba(95, 179, 255, 0.2);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(95, 179, 255, 0.45);
    }

    .card a {
      display: block;
      width: 100%;
      padding: 18px 20px;
      font-size: 1.05rem;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #1a67c7);
      color: var(--bg);
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s ease;
      text-decoration: none;
    }

    .card a:hover {
      background: linear-gradient(135deg, #8fc9ff, #3b83f1);
    }

    .card small {
      display: block;
      margin-top: 14px;
      color: rgba(245, 249, 255, 0.75);
      font-size: 0.75rem;
    }

    .social-fixed {
      position: fixed;
      top: 18px;
      right: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      z-index: 1000;
    }

    .social-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: width 0.2s ease, padding 0.2s ease, transform 0.18s ease, background 0.18s ease;
      overflow: hidden;
    }

    .social-chip:hover {
      width: 160px;
      justify-content: flex-start;
      padding-left: 10px;
      border-radius: 999px;
      background: rgba(95, 179, 255, 0.18);
      transform: translateY(-2px);
    }

    .social-chip.discord:hover {
      width: 105px;
    }

    .social-chip.instagram:hover {
      width: 145px;
    }

    .social-chip svg {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .social-chip .label {
      max-width: 0;
      opacity: 0;
      margin-left: 0;
      white-space: nowrap;
      overflow: hidden;
      transition: max-width 0.2s ease, opacity 0.2s ease, margin-left 0.2s ease;
    }

    .social-chip:hover .label {
      max-width: 80px;
      opacity: 1;
      margin-left: 8px;
    }

    .social-chip.discord:hover .label {
      max-width: 60px;
    }

    .social-chip.instagram:hover .label {
      max-width: 100px;
    }

    @media (max-width: 760px) {
      .container {
        padding: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 22px 18px;
      }
    }
  </style>
</head>
