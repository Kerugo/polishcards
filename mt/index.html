<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <title>PL Mysterious Treasures</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #10263f;
      --surface-light: #1f4f8b;
      --accent: #4fb0ff;
      --text: #e8f4ff;
      --muted: #a8cbe8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(79, 176, 255, 0.22), transparent 32%),
        linear-gradient(180deg, #07101d 0%, #081622 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 24px;
      padding: 24px 28px;
      background: rgba(16, 38, 63, 0.9);
      border: 1px solid rgba(79, 176, 255, 0.18);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 45, 80, 0.22);
    }

    header h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: rgba(21, 50, 82, 0.92);
      border: 1px solid rgba(79, 176, 255, 0.18);
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(15, 45, 80, 0.25);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      object-position: top;
      background: linear-gradient(135deg, #1e4fa0, #234a87);
    }

    .card p {
      margin: 14px 16px 18px;
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(100%, 960px);
      max-height: min(100vh, 860px);
      overflow: auto;
      background: rgba(8, 18, 36, 0.98);
      border: 1px solid rgba(79, 176, 255, 0.22);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 45, 80, 0.35);
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: clamp(1.5rem, 2vw, 2rem);
      line-height: 1.1;
    }

    .modal-close {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--text);
      border-radius: 14px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
    }

    .modal-body {
      display: grid;
      gap: 20px;
      grid-template-columns: 1.4fr 1fr;
      align-items: start;
    }

    .modal-body img {
      width: 100%;
      border-radius: 20px;
      object-fit: contain;
      object-position: top;
      background: #0f1f36;
    }

    .modal-info {
      display: grid;
      gap: 12px;
      padding-left: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(16, 38, 63, 0.9);
    }

    .info-row span:first-child {
      color: var(--muted);
    }

    .social-fixed {
      position: fixed;
      top: 18px;
      right: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      z-index: 1000;
    }

    .social-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      color: var(--text);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: width 0.2s ease, padding 0.2s ease, transform 0.18s ease, background 0.18s ease;
      overflow: hidden;
    }

    .social-chip:hover {
      width: 160px;
      justify-content: flex-start;
      padding-left: 10px;
      border-radius: 999px;
      background: rgba(79, 176, 255, 0.18);
      transform: translateY(-2px);
    }

    .social-chip.discord:hover {
      width: 105px;
    }

    .social-chip.instagram:hover {
      width: 145px;
    }

    .social-chip img,
    .social-chip svg {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
      object-fit: contain;
    }

    .social-chip .label {
      max-width: 0;
      opacity: 0;
      margin-left: 0;
      white-space: nowrap;
      overflow: hidden;
      transition: max-width 0.2s ease, opacity 0.2s ease, margin-left 0.2s ease;
    }

    .social-chip:hover .label {
      max-width: 80px;
      opacity: 1;
      margin-left: 8px;
    }

    .social-chip.discord:hover .label {
      max-width: 60px;
    }

    .social-chip.instagram:hover .label {
      max-width: 100px;
    }

    @media (max-width: 880px) {
      .modal-body {
        grid-template-columns: 1fr;
      }

      .modal-info {
        padding-left: 0;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      header {
        padding: 18px 20px;
      }
    }
  </style>
</head>

  </div>
  <header>
    <h1>Mysterious Treasures</h1>
    <p>Polish Pokemon cards from Tajemne Skarby expansion.</p>
  </header>

  <main>
    <div class="grid" id="boxGrid"></div>
  </main>

  <div class="modal-backdrop" id="cardModal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Tytuł karty</h2>
        <button class="modal-close" id="closeModal" aria-label="Zamknij">×</button>
      </div>
      <div class="modal-body">
        <img id="modalImage" src="" alt="" />
        <div class="modal-info">
          <div class="info-row"><span>Id:</span><span id="modalId"></span></div>
          <div class="info-row"><span>Rarity:</span><span id="modalRarity"></span></div>
          <div class="info-row"><span>Variant:</span><span id="modalVariant"></span></div>
          <div class="info-row"><span>Type:</span><span id="modalType"></span></div>
          <div class="info-row"><span>Artist:</span><span id="modalArtist"></span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById('boxGrid');
    const modalBackdrop = document.getElementById('cardModal');
    const closeModalButton = document.getElementById('closeModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalImage = document.getElementById('modalImage');
    const modalId = document.getElementById('modalId');
    const modalRarity = document.getElementById('modalRarity');
    const modalVariant = document.getElementById('modalVariant');
    const modalType = document.getElementById('modalType');
    const modalArtist = document.getElementById('modalArtist');

    const dataFileUrl = 'cards.json';
    let cardData = [];

    function createCardElement(data, index) {
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.index = index;
      card.innerHTML = `
        <img src="${data.src}" alt="${data.alt}" />
        <p>${data.title}</p>
      `;
      return card;
    }

    function renderCards(cards) {
      grid.innerHTML = '';
      cards.forEach((data, index) => {
        grid.appendChild(createCardElement(data, index));
      });
    }

    function openModal(card) {
      modalTitle.textContent = card.title;
      modalImage.src = card.src;
      modalImage.alt = card.alt;
      modalId.textContent = card.id;
      modalRarity.textContent = card.rarity;
      modalVariant.textContent = card.variant;
      modalType.textContent = card.type;
      modalArtist.textContent = card.artist;
      modalBackdrop.classList.add('open');
    }

    function closeModal() {
      modalBackdrop.classList.remove('open');
    }

    async function loadCardData() {
      try {
        const response = await fetch(dataFileUrl);
        if (!response.ok) throw new Error(`Nie można pobrać ${dataFileUrl}`);
        const json = await response.json();
        if (!Array.isArray(json)) throw new Error('Plik JSON musi zawierać tablicę obiektów.');

        return json.map((item, index) => ({
          src: item.src || `images/${index + 1}.jpg`,
          alt: item.alt || item.title || `Pokemon ${index + 1}`,
          title: item.title || `Pokemon ${index + 1}`,
          id: item.id || '000',
          rarity: item.rarity || 'xyz',
          variant: item.variant || 'xyz',
          type: item.type || 'xyz',
          artist: item.artist || 'xyz',
        }));
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    async function init() {
      cardData = await loadCardData();
      renderCards(cardData);

      grid.addEventListener('click', (event) => {
        const card = event.target.closest('.card');
        if (!card) return;
        openModal(cardData[Number(card.dataset.index)]);
      });
    }

    closeModalButton.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', (event) => {
      if (event.target === modalBackdrop) closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });

    init();
  </script>
</body>
</html>
